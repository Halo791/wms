version: "3.3"

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      APP_KEY: ${APP_KEY}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://gudang-backend.hovertech.my.id
      FRONTEND_URL: https://gudang.hovertech.my.id
      SANCTUM_STATEFUL_DOMAINS: gudang.hovertech.my.id,gudang-backend.hovertech.my.id
      CORS_ALLOWED_ORIGINS: https://gudang.hovertech.my.id
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/data/database.sqlite
      SESSION_DRIVER: database
      SESSION_DOMAIN: .hovertech.my.id
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stderr
      RUN_MIGRATIONS: "true"
      RUN_SEEDER: "false"
    volumes:
      - wms_backend_data:/var/www/data
      - wms_backend_storage:/var/www/backend/storage
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-network"
      - "traefik.http.routers.wms-backend-router.rule=Host(`gudang-backend.hovertech.my.id`)"
      - "traefik.http.routers.wms-backend-router.entryPoints=websecure"
      - "traefik.http.routers.wms-backend-router.tls=true"
      - "traefik.http.routers.wms-backend-router.tls.certresolver=leResolver"
      - "traefik.http.routers.wms-backend-router.service=wms-backend-service@docker"
      - "traefik.http.services.wms-backend-service.loadbalancer.server.port=8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: https://gudang-backend.hovertech.my.id/api
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-network"
      - "traefik.http.routers.wms-frontend-router.rule=Host(`gudang.hovertech.my.id`)"
      - "traefik.http.routers.wms-frontend-router.entryPoints=websecure"
      - "traefik.http.routers.wms-frontend-router.tls=true"
      - "traefik.http.routers.wms-frontend-router.tls.certresolver=leResolver"
      - "traefik.http.routers.wms-frontend-router.service=wms-frontend-service@docker"
      - "traefik.http.services.wms-frontend-service.loadbalancer.server.port=80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  traefik-network:
    external: true

volumes:
  wms_backend_data:
  wms_backend_storage:
